plugins {
    id 'java'
    id 'application'
}

group = 'com.example1'
version = '1.0-SNAPSHOT'

description = "MyMavenToGradle"

// Use standard Java toolchain for compatibility
java {
    sourceCompatibility = JavaVersion.VERSION_1_8
    targetCompatibility = JavaVersion.VERSION_1_8
}

repositories {
    mavenCentral()
}

dependencies {
    // Selenium and WebDriverManager for automation
    implementation 'org.seleniumhq.selenium:selenium-java:4.20.0'
    implementation 'io.github.bonigarcia:webdrivermanager:5.8.0'

    // JUnit for testing
    testImplementation 'junit:junit:4.13.2'
}

application {
    // For Gradle 7.0+, use mainClass. 
    // Ensure this matches the package and class name in your src/main/java folder.
    mainClass = 'com.example.App' 
}

// Ensure tests use JUnit 4
test {
    useJUnit()
}
